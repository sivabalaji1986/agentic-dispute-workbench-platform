# Spring Boot's classpath:/application.properties location resolves to a single
# resource via the classloader (first match wins, not merged across JARs/dirs), and
# under `mvn test` target/test-classes precedes target/classes on the classpath. So
# this file entirely shadows main/resources/application.properties for the test
# run rather than layering on top of it — it must repeat everything the app needs
# to configure, not just the one property this task cares about.
server.port=8081
spring.application.name=case-review-agent
workbench.mcp.case-system.url=http://localhost:8083
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.streamable-http.connections.case-system.url=${workbench.mcp.case-system.url}
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:14b

# Test-only addition: the real MCP server at workbench.mcp.case-system.url is not
# running under `mvn test`. McpClientAutoConfiguration.mcpSyncClients() calls
# McpSyncClient.initialize(), which blocks on a real network handshake, when
# spring.ai.mcp.client.initialized=true (the default). AgentCardSmokeTest boots the
# full Spring context (see that test's javadoc), so without this override the
# context fails to start with a ConnectException instead of testing the AgentCard
# wiring it's actually meant to verify. Disabling eager initialization here is safe
# because nothing in this module's tests calls the MCP client through the
# autoconfigured McpSyncClient bean directly — CaseMcpClientTest (Task 2) and
# CaseReviewAgentExecutorTest (this task) both construct/mock CaseMcpClient
# directly, bypassing Spring wiring entirely.
spring.ai.mcp.client.initialized=false
